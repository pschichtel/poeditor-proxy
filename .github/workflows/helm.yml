name: Helm Chart Publish
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io --username ${{ github.actor }} --password-stdin
      - name: Check if version already published
        id: check
        run: |
          VERSION=$(yq '.version' helm/Chart.yaml)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if helm show chart oci://ghcr.io/pschichtel/helm/poeditor-proxy --version "$VERSION" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Package Helm chart
        if: steps.check.outputs.exists == 'false'
        run: helm package helm/
      - name: Push Helm chart
        if: steps.check.outputs.exists == 'false'
        run: helm push poeditor-proxy-${{ steps.check.outputs.version }}.tgz oci://ghcr.io/pschichtel/helm
